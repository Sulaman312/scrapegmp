<div id="panel-why-choose-us" class="panel hidden p-6 w-full bernard-only multipage-only">
  <div class="panel-head">
    <div class="flex items-center gap-3 mb-1">
      <div class="ph-icon"><svg viewBox="0 0 24 24">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg></div>
      <h2>Why Choose Us</h2>
    </div>
    <p>Edit heading, background image, and the advantage cards shown on home page.</p>
  </div>

  <div class="space-y-4">
    <div class="card">
      <div class="sdiv">Section Header</div>
      <div class="grid grid-cols-2 gap-x-4 gap-y-3">
        <div>
          <label class="fl">Heading</label>
          <input type="text" id="ai-why_choose_us_heading" class="fi" placeholder="Why Choose Us?" />
        </div>
        <div>
          <label class="fl">Background Image</label>
          <select id="theme-why_choose_us_image" class="fi">
            <option value="">Auto-select</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sdiv">Advantage Cards</div>
      <p class="text-xs text-slate-500 mb-3">Configure icon, title, and text for each card. Existing website values load here.</p>
      <div id="bernardWhyChooseCardsList" class="feature-grid"></div>
      <button class="btn-add" onclick="addBernardWhyChooseCard()">+ Add Why Choose Card</button>
    </div>
  </div>
</div>
