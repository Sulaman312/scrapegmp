<div id="panel-seo" class="panel hidden p-6 w-full">
  <div class="panel-head">
    <div class="flex items-center gap-3 mb-1">
      <div class="ph-icon"><svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg></div>
      <h2>SEO</h2>
    </div>
    <p>Controls how your site appears in Google search results and link previews.</p>
  </div>

  <div class="card space-y-4">
    <div>
      <label class="fl">SEO Title <span class="si si-g">→ Browser tab &amp; Google search result title</span> — ideal 50–60 chars</label>
      <input type="text" id="ai-seo_title" class="fi" placeholder="Business Name | Tagline | Location" />
      <p id="seoTitleCount" class="text-xs mt-1 char-ok">0 characters</p>
    </div>
    <div>
      <label class="fl">SEO Description <span class="si si-g">→ Google search result snippet</span> — ideal 150–160 chars</label>
      <textarea id="ai-seo_description" class="fi" rows="4"></textarea>
      <p id="seoDescCount" class="text-xs mt-1 char-ok">0 characters</p>
    </div>
  </div>
</div>
