<div id="panel-services-page" class="panel hidden p-6 w-full bernard-only multipage-only">
  <div class="panel-head">
    <div class="flex items-center gap-3 mb-1">
      <div class="ph-icon"><svg viewBox="0 0 24 24">
        <path d="M9 12h6M9 8h6M9 16h6M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg></div>
      <h2>Services Page</h2>
    </div>
    <p>Edit dedicated Services page section text and cards.</p>
  </div>

  <div class="space-y-4">
    <div class="card">
      <div class="sdiv">Section Text</div>
      <div class="grid grid-cols-2 gap-x-4 gap-y-3">
        <div>
          <label class="fl">Small Text</label>
          <input type="text" id="ai-services_page_small_text" class="fi" placeholder="What we offer" />
        </div>
        <div>
          <label class="fl">Heading</label>
          <input type="text" id="ai-services_page_heading" class="fi" placeholder="Complete Service Catalog" />
        </div>
      </div>
      <div class="mt-3">
        <label class="fl">Description</label>
        <textarea id="ai-services_page_description" class="fi" rows="2" placeholder="Explore our full range of professional services..."></textarea>
      </div>
    </div>

    <div class="card">
      <div class="sdiv">Service Cards (Services Page)</div>
      <p class="text-xs text-slate-500 mb-3">Each card supports title, text, image, and optional link. Existing website values load here.</p>
      <div id="bernardServicesPageCardsList" class="feature-grid"></div>
      <button class="btn-add" onclick="addBernardServicesPageCard()">+ Add Service Card</button>
    </div>
  </div>
</div>
