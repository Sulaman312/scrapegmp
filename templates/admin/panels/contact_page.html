<div id="panel-contact-page" class="panel hidden p-6 w-full bernard-only multipage-only">
  <div class="panel-head">
    <div class="flex items-center gap-3 mb-1">
      <div class="ph-icon"><svg viewBox="0 0 24 24">
        <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg></div>
      <h2>Contact Page Content</h2>
    </div>
    <p>Customize the content for the dedicated Contact page.</p>
  </div>

  <div class="space-y-4">
    <!-- SEO -->
    <div class="card">
      <div class="sdiv">SEO Meta Tags</div>
      <div class="space-y-3">
        <div>
          <label class="fl">Contact Page SEO Title</label>
          <input type="text" id="ai-contact_page_seo_title" class="fi" placeholder="Contact Us - Your Business Name" />
        </div>
        <div>
          <label class="fl">Contact Page SEO Description</label>
          <textarea id="ai-contact_page_seo_description" class="fi" rows="2" placeholder="Get in touch with us today..."></textarea>
        </div>
      </div>
    </div>

    <!-- Hero Section -->
    <div class="card">
      <div class="sdiv">Page Hero</div>
      <div class="space-y-3">
        <div>
          <label class="fl">Hero Title</label>
          <input type="text" id="ai-contact_page_hero_title" class="fi" placeholder="Contact Us" />
        </div>
        <div>
          <label class="fl">Hero Subtitle</label>
          <textarea id="ai-contact_page_hero_subtitle" class="fi" rows="2" placeholder="We'd love to hear from you..."></textarea>
        </div>
      </div>
    </div>

    <!-- Contact Section Content -->
    <div class="card">
      <div class="sdiv">Contact Section</div>
      <div class="space-y-3">
        <div>
          <label class="fl">Small Text <span class="si si-g">→ Appears above heading</span></label>
          <input type="text" id="ai-contact_page_small_text" class="fi" placeholder="Get In Touch" />
        </div>
        <div>
          <label class="fl">Section Heading</label>
          <input type="text" id="ai-contact_page_heading" class="fi" placeholder="We're Here to Help" />
        </div>
        <div>
          <label class="fl">Description</label>
          <textarea id="ai-contact_page_description" class="fi" rows="3" placeholder="Contact us for inquiries, support, or to schedule a consultation..."></textarea>
        </div>
      </div>
    </div>
  </div>
</div>
