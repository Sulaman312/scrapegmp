<div id="panel-our-services" class="panel hidden p-6 w-full bernard-only multipage-only">
  <div class="panel-head">
    <div class="flex items-center gap-3 mb-1">
      <div class="ph-icon"><svg viewBox="0 0 24 24">
        <path d="M4 7h16M4 12h16M4 17h10" />
      </svg></div>
      <h2>Our Services</h2>
    </div>
    <p>Edit home page services heading and cards shown in Discover Our Services.</p>
  </div>

  <div class="space-y-4">
    <div class="card">
      <div class="sdiv">Section Text</div>
      <div class="grid grid-cols-2 gap-x-4 gap-y-3">
        <div>
          <label class="fl">Small Text</label>
          <input type="text" id="ai-services_small_text" class="fi" placeholder="For individuals and professionals" />
        </div>
        <div>
          <label class="fl">Heading</label>
          <input type="text" id="ai-services_heading" class="fi" placeholder="Discover our services" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sdiv">Service Cards (Home)</div>
      <p class="text-xs text-slate-500 mb-3">Each card supports title, text, image, and optional link. Existing website values load here.</p>
      <div id="bernardServicesCardsList" class="feature-grid"></div>
      <button class="btn-add" onclick="addBernardServiceCard()">+ Add Service Card</button>
    </div>
  </div>
</div>
