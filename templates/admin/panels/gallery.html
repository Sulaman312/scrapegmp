<div id="panel-gallery" class="panel hidden p-6 w-full">
  <div class="panel-head">
    <div class="flex items-start justify-between gap-4 mb-1">
      <div>
        <div class="flex items-center gap-3 mb-1">
          <div class="ph-icon"><svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="M21 15l-5-5L5 21" />
          </svg></div>
          <h2>Gallery</h2>
        </div>
        <p>Upload images, set the hero background, reorder, exclude. <span class="si si-b">→ Hero background · Gallery section · About section</span></p>
      </div>
      <button onclick="document.getElementById('fileUploadInput').click()"
        style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
               background:#16a34a;border:1px solid #16a34a;color:#fff;font-size:12px;
               font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s"
        onmouseover="this.style.background='#15803d'" onmouseout="this.style.background='#16a34a'">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        Upload
      </button>
    </div>
  </div>

  <!-- Media Library -->
  <div class="card p-0 overflow-hidden media-lib">
    <!-- Toolbar -->
    <div class="media-toolbar">
      <div class="media-tab-group">
        <button class="media-tab" id="mtab-upload" onclick="switchMediaTab('upload',this)" style="display:inline-flex;align-items:center;gap:5px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>Upload Files</button>
        <button class="media-tab active" id="mtab-library" onclick="switchMediaTab('library',this)">Media Library</button>
      </div>
      <input type="text" id="mediaSearchInput" class="media-search" placeholder="Search images…" oninput="filterMediaGrid(this.value)" />
      <span id="imgTotalCount" class="text-xs text-slate-500 ml-auto"></span>
    </div>

    <!-- Upload Tab (hidden by default — library shown first) -->
    <div id="mediaTab-upload" class="p-4 hidden">
      <div id="uploadDropzone"
        onclick="document.getElementById('fileUploadInput').click()"
        ondragover="event.preventDefault();this.classList.add('!border-green-500')"
        ondragleave="this.classList.remove('!border-green-500')"
        ondrop="handleFileDrop(event)"
        style="border:2px dashed #334155;border-radius:.625rem;padding:2rem;text-align:center;cursor:pointer;transition:border-color .15s">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 mx-auto mb-3 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        <p class="text-sm text-slate-300 font-semibold mb-1">Click to browse or drag &amp; drop</p>
        <p class="text-xs text-slate-500">JPG, PNG, WebP → auto-converted to WebP &nbsp;·&nbsp; MP4, MOV supported</p>
        <input type="file" id="fileUploadInput" class="hidden" multiple accept="image/*,video/*" onchange="handleFileSelect(this)" />
      </div>
      <div id="uploadProgress" class="hidden mt-3"></div>
    </div>

    <!-- Library Tab (visible by default) -->
    <div id="mediaTab-library" class="media-lib-body">
      <div id="mediaGrid" class="media-grid">
        <div class="media-empty">No images yet — upload some above.</div>
      </div>
      <div id="mediaSidebar" class="media-sidebar">
        <div class="media-sidebar-empty">Select an image<br>to view its details</div>
      </div>
    </div>
  </div>
</div>
