<section id="gallery" class="py-32 px-6" style="background:#0a0a18">
  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-14" data-aos="fade-up">
      <div>
        <div class="sec-pill sec-pill-dark">{{ tr.gallery.pill if tr and tr.gallery else 'Gallery' }}</div>
        <h2 class="text-5xl md:text-6xl font-black text-white leading-[1.08] tracking-[-0.02em]">{{ tr.gallery.heading_prefix if tr and tr.gallery else 'Discover it' }} <span style="background:linear-gradient(135deg, {{ theme_color1 }} 0%, {{ theme_color2 }} 50%, {{ theme_color3 }} 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">{{ tr.gallery.heading_highlight if tr and tr.gallery else 'in action' }}</span></h2>
      </div>
      <a href='{{ cta_url }}' target='_blank' class='cta-btn text-white font-bold px-7 py-3.5 rounded-xl text-sm whitespace-nowrap shrink-0'>{{ cta_text }} →</a>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
        {% for image in gallery_images %}<div class="group relative overflow-hidden rounded-2xl bg-gray-900 shadow-lg" style="aspect-ratio:4/3" data-aos="fade-up" data-aos-delay="{{ image.delay if image.delay is defined else ((loop.index0 % 3) * 80) }}">
          <img src="{{ image.src if image.src is defined else image.url }}" alt="{{ image.alt if image.alt is defined else (business_name ~ ' photo ' ~ loop.index) }}"
               class="absolute inset-0 w-full h-full object-cover transition-transform duration-700"
               style="transform-origin:center;transition:transform .7s ease"/>
          <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent
                      opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          <div class="absolute bottom-4 left-4 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-2 group-hover:translate-y-0">
            <span class="text-white text-xs font-semibold bg-white/20 backdrop-blur px-3 py-1.5 rounded-full">{{ business_name }}</span>
          </div>
        </div>
        {% endfor %}</div>
  </div>
</section>
