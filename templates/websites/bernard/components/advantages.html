<!-- ADVANTAGES SECTION (3 cards) -->
<section class="section-advantages" id="advantages">
    <div class="container">
        <div class="advantages-grid">
            {% for advantage in advantages %}
            <div class="advantage-card" data-aos="fade-up" data-aos-delay="{{ loop.index0 * 100 }}">
                <div class="advantage-icon">
                    {% if advantage.icon_type == 'material' %}
                    <span class="material-symbols-outlined">{{ advantage.icon }}</span>
                    {% else %}
                    {{ advantage.icon }}
                    {% endif %}
                </div>
                <h3>{{ advantage.title }}</h3>
                <p>{{ advantage.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
