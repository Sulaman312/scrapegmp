<!-- HERO SECTION -->
<section class="hero" id="home">
    <div class="hero-background" style="background-image: url('{{ hero_image }}');">
        <div class="hero-overlay"></div>
        <div class="hero-content-wrapper">
            <div class="container">
                <div class="hero-grid">
                    <!-- Left: Text and CTAs -->
                    <div class="hero-left">
                        <p class="hero-small-text">{{ hero_small_text }}</p>
                        <h1 class="hero-heading">{{ hero_heading }}</h1>
                        <div class="hero-buttons">
                            <a href="{{ cta_primary_url }}" class="btn btn-primary">{{ cta_primary }}</a>
                            <a href="{{ cta_secondary_url }}" class="btn btn-accent">{{ cta_secondary }}</a>
                        </div>
                    </div>

                    <!-- Right: Contact Form -->
                    <div class="hero-form-container">
                        <form class="hero-form" method="post" action="/api/public/contact" data-bernard-contact-form="true" data-form-type="hero">
                            <h3>{{ form_heading }}</h3>
                            <input type="hidden" name="business_name" value="{{ business_name }}">
                            <input type="hidden" name="form_type" value="hero">
                            <div class="form-group">
                                <input type="text" name="name" placeholder="{{ tr.hero.name_placeholder if tr and tr.hero else 'Name' }}" required>
                            </div>
                            <div class="form-group">
                                <input type="tel" name="phone" placeholder="{{ tr.hero.phone_placeholder if tr and tr.hero else 'Telephone' }}" required>
                            </div>
                            <button type="submit" class="btn btn-submit">{{ form_button_text }}</button>
                            <p class="form-status" data-form-status aria-live="polite"></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
