<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <div class="navbar-content">
            <a href="#" class="navbar-logo">
                {% if logo_image %}
                <img src="{{ logo_image }}" alt="{{ business_name }} Logo">
                {% else %}
                <span class="navbar-brand-text">{{ business_name }}</span>
                {% endif %}
            </a>
            <div class="navbar-links">
                {% for link in nav_links %}
                <a href="{{ link.href }}">{{ link.label }}</a>
                {% endfor %}
            </div>
        </div>
    </div>
</nav>
