<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <div class="navbar-content">
            <a href="{{ 'index.html' if is_multipage else '#' }}" class="navbar-logo">
                {% if logo_image %}
                <img src="{{ logo_image }}" alt="{{ business_name }} Logo">
                {% else %}
                <span class="navbar-brand-text">{{ business_name }}</span>
                {% endif %}
            </a>
            {% if phone %}
            <a href="tel:{{ phone }}" class="navbar-call-btn" aria-label="Call {{ business_name }}">
                <span class="material-symbols-outlined">call</span>
            </a>
            {% endif %}
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="navbar-links" id="navbarLinks">
                {% for link in nav_links %}
                <a href="{{ link.href }}" {% if link.active %}class="active"{% endif %}>{{ link.label }}</a>
                {% endfor %}
            </div>
        </div>
    </div>
</nav>
