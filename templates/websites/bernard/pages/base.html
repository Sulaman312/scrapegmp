<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ seo_title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ seo_description }}{% endblock %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <style>
{{ bernard_css }}
    </style>
</head>
<body>

{% include 'websites/bernard/components/top_header.html' %}

{% include 'websites/bernard/components/navbar.html' %}

{% block content %}
{% endblock %}

{% include 'websites/bernard/components/footer.html' %}

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  // Initialize AOS animations
  AOS.init({
    duration: 800,
    once: true,
    offset: 80,
    easing: 'ease-out-cubic'
  });

  // Hamburger menu toggle
  const hamburger = document.getElementById('hamburger');
  const navbarLinks = document.getElementById('navbarLinks');

  if (hamburger && navbarLinks) {
    hamburger.addEventListener('click', function() {
      hamburger.classList.toggle('active');
      navbarLinks.classList.toggle('active');
      document.body.style.overflow = navbarLinks.classList.contains('active') ? 'hidden' : '';
    });

    // Close menu when clicking nav links
    navbarLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        navbarLinks.classList.remove('active');
        document.body.style.overflow = '';
      });
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !navbarLinks.contains(e.target)) {
        hamburger.classList.remove('active');
        navbarLinks.classList.remove('active');
        document.body.style.overflow = '';
      }
    });
  }

  // Smooth scroll for anchor links (only for same-page navigation)
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  {% block extra_scripts %}
  {% endblock %}
</script>

</body>
</html>
