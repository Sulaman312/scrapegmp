<!-- HERO - Full image with overlay and pill buttons -->
<section class="hero" id="hero">
    <div class="hero-frame">
        <div class="hero-background parallax-bg" style="background-image: url('{{ hero_image }}')"></div>
        <div class="hero-overlay"></div>
        <div class="container">
            <div class="hero-content">
                <h1 class="fade-in-hero">{{ seo_title }}</h1>
                <p class="hero-subtitle fade-in-hero" style="animation-delay: 0.2s;">{{ hero_subtitle }}</p>
                <div class="hero-buttons fade-in-hero" style="animation-delay: 0.4s;">
                    <a href="{{ cta_primary_url }}" class="btn btn-pill-primary btn-glow">{{ cta_primary }}</a>
                    <a href="#contact" class="btn btn-pill-outline">{{ cta_secondary }}</a>
                </div>
            </div>
        </div>
    </div>
</section>
