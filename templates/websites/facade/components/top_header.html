<!-- TOP HEADER - Centered contact info -->
<div class="top-header">
    <div class="container-fluid">
        <div class="top-header-content">
            <a href="mailto:{{ email }}" class="top-header-item">
                <span class="icon">📧</span>
                <span>{{ email }}</span>
            </a>
            <span class="top-header-divider">|</span>
            <a href="tel:{{ phone }}" class="top-header-item">
                <span class="icon">📱</span>
                <span>{{ phone }}</span>
            </a>
        </div>
    </div>
</div>
